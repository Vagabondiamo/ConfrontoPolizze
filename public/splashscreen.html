<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Futuria Brochure</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      html, body {
        width: 520px;
        height: 520px;
        overflow: hidden;
        background: #0E2D50;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: 'Segoe UI', system-ui, sans-serif;
        user-select: none;
      }

      .logo-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
        animation: fadeIn 0.5s ease-out;
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(14px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .logo {
        width: 160px;
        height: 160px;
        border-radius: 32px;
        box-shadow: 0 12px 48px rgba(0,0,0,0.5);
        object-fit: contain;
        background: #fff;
      }

      .app-name {
        color: #ffffff;
        font-size: 26px;
        font-weight: 700;
        letter-spacing: 0.04em;
      }

      .app-name span {
        color: #C2942E;
      }

      .subtitle {
        color: rgba(255,255,255,0.45);
        font-size: 12px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        margin-top: -14px;
      }

      .spinner-wrap {
        margin-top: 6px;
      }
    </style>

    <script type="module">
      import { dotSpinner } from 'https://cdn.jsdelivr.net/npm/ldrs/dist/auto/dotSpinner.js';
      dotSpinner.register();
    </script>
  </head>
  <body>
    <div class="logo-wrapper">
      <img class="logo" src="/splash-logo.png" alt="Futuria Logo" />
      <div class="app-name">Futuria <span>Brochure</span></div>
      <div class="subtitle">Confronto Polizze</div>
      <div class="spinner-wrap">
        <l-dot-spinner
          size="40"
          speed="0.9"
          color="#C2942E"
        ></l-dot-spinner>
      </div>
    </div>
  </body>
</html>
