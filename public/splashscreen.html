<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Futuria Brochure</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        background: #0E2D50;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        overflow: hidden;
        font-family: 'Segoe UI', system-ui, sans-serif;
        user-select: none;
      }

      .logo-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 28px;
        animation: fadeIn 0.6s ease-out;
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .logo {
        width: 110px;
        height: 110px;
        border-radius: 24px;
        box-shadow: 0 8px 40px rgba(0,0,0,0.45);
        object-fit: cover;
      }

      .app-name {
        color: #ffffff;
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 0.04em;
      }

      .app-name span {
        color: #C2942E;
      }

      .subtitle {
        color: rgba(255,255,255,0.45);
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        margin-top: -18px;
      }

      .spinner-wrap {
        margin-top: 8px;
      }
    </style>

    <!-- ldrs web component -->
    <script type="module">
      import { lineSpinner } from 'https://cdn.jsdelivr.net/npm/ldrs/dist/auto/lineSpinner.js';
      lineSpinner.register();
    </script>
  </head>
  <body>
    <div class="logo-wrapper">
      <img class="logo" src="/splash-logo.jpg" alt="Futuria Logo" />
      <div class="app-name">Futuria <span>Brochure</span></div>
      <div class="subtitle">Confronto Polizze</div>
      <div class="spinner-wrap">
        <l-line-spinner
          size="36"
          stroke="3"
          speed="1"
          color="#C2942E"
        ></l-line-spinner>
      </div>
    </div>
  </body>
</html>
