<!doctype html>
<html lang="it">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#0E2D50" />
        <link rel="manifest" href="/manifest.json"/>
        <meta name="description" content="Generatore di brochure trifold A4 per il confronto di polizze assicurative. Esporta in PDF." />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;700;800&family=Bricolage+Grotesque:wght@700;800&display=swap" rel="stylesheet" />
        <title>Futuria Brochure — Confronto Polizze</title>
    </head>
    <body>
        <noscript>Devi abilitare JavaScript per eseguire questa app.</noscript>
        <script>
            // Se NON siamo dentro l'app desktop Tauri, nascondi la schermata di caricamento sul sito web
            if (!window.__TAURI_INTERNALS__ && !window.__TAURI__) {
                document.write('<style>#initial-loader-bg { display: none !important; }</style>');
            }
        </script>
        <script type="module">
            if (window.__TAURI_INTERNALS__ || window.__TAURI__) {
                import('https://cdn.jsdelivr.net/npm/ldrs/dist/auto/dotSpinner.js').then(m => m.dotSpinner?.register?.());
            }
        </script>
        <div id="root">
            <style>
                #initial-loader-bg {
                    position: fixed;
                    inset: 0;
                    background-color: #0E2D50;
                    display: flex;
                    flex-direction: column;
                    align-items: center;
                    justify-content: center;
                    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
                    z-index: 99999;
                    user-select: none;
                }
                .initial-loader-logo {
                    width: 120px;
                    height: 120px;
                    border-radius: 24px;
                    box-shadow: 0 12px 36px rgba(0,0,0,0.4);
                    object-fit: cover;
                    margin-bottom: 20px;
                }
                .initial-loader-title {
                    color: #ffffff;
                    font-size: 24px;
                    font-weight: 700;
                    letter-spacing: -0.02em;
                    margin-bottom: 4px;
                }
                .initial-loader-title span {
                    color: #C2942E;
                }
                .initial-loader-subtitle {
                    color: rgba(255, 255, 255, 0.5);
                    font-size: 13px;
                    margin-bottom: 24px;
                    letter-spacing: 0.05em;
                    text-transform: uppercase;
                }
            </style>
            <div id="initial-loader-bg">
                <img src="/splash-logo.jpg" alt="Futuria Logo" class="initial-loader-logo" />
                <div class="initial-loader-title">Futuria <span>Brochure</span></div>
                <div class="initial-loader-subtitle">Confronto Polizze</div>
                <l-dot-spinner
                    size="40"
                    speed="0.9"
                    color="#C2942E"
                ></l-dot-spinner>
            </div>
        </div>
        <script type="module" src="/src/main.jsx"></script>
        <script>
            // Unregister any old broken service worker that causes blank page issues
            if ("serviceWorker" in navigator) {
              navigator.serviceWorker.getRegistrations().then(registrations => {
                for (let registration of registrations) {
                  registration.unregister();
                }
              });
            }
        </script>
    </body>
</html>
